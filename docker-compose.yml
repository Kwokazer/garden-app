version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - mongo
      - rabbitmq
      - mailhog
      - jitsi-prosody
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DOCKER_ENV=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=garden
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=supersecretkey
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - FRONTEND_URL=http://localhost:3000
      # Настройки Jitsi
      - JITSI_API_URL=http://jitsi.garden.local:8000
      - JITSI_DOMAIN=meet.jitsi
      - JITSI_APP_ID=garden_app
      - JITSI_APP_SECRET=jwt_secret_for_garden_app_123
    networks:
      - garden-network
      - jitsi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    command: npx vite --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_JITSI_API_URL=http://jitsi.garden.local:8000
      - VITE_JITSI_DOMAIN=meet.jitsi
    networks:
      - garden-network
      - jitsi-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=garden
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - garden-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - garden-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - garden-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - garden-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - garden-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - garden-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/jitsi.conf:/etc/nginx/conf.d/jitsi.conf
    depends_on:
      - api
      - frontend
      - jitsi-web
    networks:
      - garden-network
      - jitsi-network

  # Jitsi компоненты с обновленной конфигурацией (взято из рабочей конфигурации)
  jitsi-web:
    image: jitsi/web:web-1.0.8606-1
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8000:80"
    volumes:
      - ./jitsi-config/web:/config
      - ./jitsi-config/web/letsencrypt:/etc/letsencrypt
      - ./jitsi-config/transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      - ENABLE_LETSENCRYPT=0
      - ENABLE_HTTP_REDIRECT=0
      - ENABLE_PREJOIN_PAGE=true
      - ENABLE_WELCOME_PAGE=true
      - ENABLE_CLOSE_PAGE=false
      - JIBRI_BREWERY_MUC=jibribrewery
      - JIBRI_PENDING_TIMEOUT=90
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=jibri_password_123
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=recorder_password_123
      - ENABLE_RECORDING=true
      - PUBLIC_URL=http://jitsi.garden.local:8000
      - TZ=Europe/Moscow
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=jicofo_secret_123
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_password_123
    networks:
      jitsi-network:
        aliases:
          - meet.jitsi

  jitsi-prosody:
    image: jitsi/prosody:prosody-13.0.1
    restart: unless-stopped
    expose:
      - '5222'
      - '5280'
      - '5347'
    volumes:
      - ./jitsi-config/prosody:/config
    environment:
      - AUTH_TYPE=internal
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=1
      - ENABLE_AV_MODERATION=1
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JICOFO_COMPONENT_SECRET=jicofo_secret_123
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_password_123
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_password_123
      - JWT_APP_ID=garden_app
      - JWT_APP_SECRET=jwt_secret_for_garden_app_123
      - TZ=Europe/Moscow
    networks:
      jitsi-network:
        aliases:
          - jitsi-prosody
          - auth.meet.jitsi
          - guest.meet.jitsi
          - muc.meet.jitsi
          - internal-muc.meet.jitsi

  jitsi-jicofo:
    image: jitsi/jicofo:jicofo-1.0-1132-1
    restart: unless-stopped
    volumes:
      - ./jitsi-config/jicofo:/config
    environment:
      - ENABLE_AUTH=true
      - ENABLE_RECORDING=true
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_COMPONENT_SECRET=jicofo_secret_123
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_password_123
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=Europe/Moscow
    depends_on:
      - jitsi-prosody
    networks:
      jitsi-network:

  jitsi-jvb:
    image: jitsi/jvb:jvb-2.3-234-gbf757253-1
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    volumes:
      - ./jitsi-config/jvb:/config
    environment:
      - DOCKER_HOST_ADDRESS=jitsi-jvb.meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_password_123
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - JVB_TCP_HARVESTER_DISABLED=true
      - JVB_TCP_PORT=4443
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302
      - JVB_ENABLE_APIS=rest
      - TZ=Europe/Moscow
    networks:
      jitsi-network:
        aliases:
          - jitsi-jvb.meet.jitsi

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  jitsi_recordings:

networks:
  garden-network:
    driver: bridge
  jitsi-network:
    driver: bridge