version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - mongo
      - rabbitmq
      - mailhog
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DOCKER_ENV=true
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=garden
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=your-super-secret-key-here-min-32-chars-long-please-change-this-in-production
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      # - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    networks:
      - garden-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    command: npx vite --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - garden-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=garden
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - garden-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - garden-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - garden-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - garden-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - garden-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      # - frontend
      - jitsi-web
    networks:
      - garden-network

  # Jitsi Meet компоненты
  jitsi-web:
    image: jitsi/web:stable
    ports:
      - "9091:443"
      - "9092:80"
      - "9443:443"
    volumes:
      - ./jitsi/web:/config
      - ./jitsi/web/crontabs:/var/spool/cron/crontabs
    environment:
      - ENABLE_AUTH=1
      - ENABLE_GUESTS=0
      - JWT_APP_ID=garden_app
      - JWT_APP_SECRET=jwt_secret_for_garden_app_123
      - ENABLE_RECORDING=1
      - ENABLE_TRANSCRIPTIONS=0
      - ENABLE_LOBBY=0
      - ENABLE_PREJOIN_PAGE=0
      - ENABLE_WELCOME_PAGE=1
      - DISABLE_HTTPS=0
      - PUBLIC_URL=https://localhost:9091
      - JICOFO_AUTH_USER=focus
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_SERVER=prosody
      - XMPP_BOSH_URL_BASE=http://prosody:5280
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - ENABLE_XMPP_WEBSOCKET=1
      - XMPP_WEBSOCKET_URL=ws://prosody:5280/xmpp-websocket
      - TZ=Europe/Moscow
    networks:
      - garden-network
    depends_on:
      - prosody

  prosody:
    image: jitsi/prosody:stable
    ports:
      - "5280:5280"
      - "5222:5222"
    volumes:
      - ./jitsi/prosody/config:/config
      - ./jitsi/prosody/prosody-plugins-custom:/prosody-plugins-custom
    environment:
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
      - ENABLE_GUESTS=0
      - JWT_APP_ID=garden_app
      - JWT_APP_SECRET=jwt_secret_for_garden_app_123
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JICOFO_COMPONENT_SECRET=s3cr3t
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_auth_password
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_auth_password
      - TZ=Europe/Moscow
    networks:
      - garden-network

  jicofo:
    image: jitsi/jicofo:stable
    volumes:
      - ./jitsi/jicofo:/config
    environment:
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_SERVER=prosody
      - JICOFO_COMPONENT_SECRET=s3cr3t
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=jicofo_auth_password
      - JVB_BREWERY_MUC=jvbbrewery@internal-muc.meet.jitsi
      - JIBRI_BREWERY_MUC=jibribrewery@internal-muc.meet.jitsi
      - TZ=Europe/Moscow
      - ENABLE_AUTH=1
      - ENABLE_RECORDING=1
    depends_on:
      - prosody
    networks:
      - garden-network

  jvb:
    image: jitsi/jvb:stable
    ports:
      - "10001:10000/udp"
    volumes:
      - ./jitsi/jvb:/config
    environment:
      - XMPP_SERVER=prosody
      - DOCKER_HOST_ADDRESS=localhost
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=jvb_auth_password
      - JVB_BREWERY_MUC=jvbbrewery@internal-muc.meet.jitsi
      - JVB_PORT=10000
      - JVB_ADVERTISE_IPS=localhost
      - JVB_ADVERTISE_PRIVATE_CANDIDATES=false
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302
      - JICOFO_AUTH_USER=focus
      - TZ=Europe/Moscow
    depends_on:
      - prosody
    networks:
      - garden-network

  jibri:
    image: jitsi/jibri:stable
    volumes:
      - ./jitsi/jibri:/config
      - ./backend/uploads/webinar_recordings:/recordings
      - /tmp:/dev/shm
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    environment:
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=jibri_password
      - JIBRI_BREWERY_MUC=jibribrewery@internal-muc.meet.jitsi
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=recorder_password
      - JIBRI_RECORDING_DIR=/recordings
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH=/config/finalize.sh
      - ENABLE_RECORDING=1
      - PUBLIC_URL=http://localhost:9091
      - TZ=Europe/Moscow
    depends_on:
      - jitsi-web
    networks:
      - garden-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info -Q celery,webinar
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DOCKER_ENV=true
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    networks:
      - garden-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DOCKER_ENV=true
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    networks:
      - garden-network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - garden-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  jitsi_recordings:

networks:
  garden-network:
    driver: bridge