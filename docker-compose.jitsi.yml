version: '3.8'

services:
  jitsi-web:
    image: jitsi/web:web-1.0.8606-1
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8000:80"
    volumes:
      - ${CONFIG}/web:/config
      - ${CONFIG}/web/letsencrypt:/etc/letsencrypt
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      - ENABLE_LETSENCRYPT=0
      - ENABLE_HTTP_REDIRECT=0
      - ENABLE_PREJOIN_PAGE=true
      - ENABLE_WELCOME_PAGE=true
      - ENABLE_CLOSE_PAGE=false
      - JIBRI_BREWERY_MUC=jibribrewery
      - JIBRI_PENDING_TIMEOUT=90
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - ENABLE_RECORDING=true
      - PUBLIC_URL=${PUBLIC_URL}
      - TZ=Europe/Moscow
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_BOSH_URL_BASE=http://jitsi-prosody:5280
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
    networks:
      jitsi-network:
        aliases:
          - ${XMPP_DOMAIN}

  jitsi-prosody:
    image: jitsi/prosody:prosody-13.0.1
    restart: unless-stopped
    expose:
      - '5222'
      - '5280'
      - '5347'
    volumes:
      - ${CONFIG}/prosody:/config
    environment:
      - AUTH_TYPE=internal
      - ENABLE_GUESTS=1
      - ENABLE_LOBBY=1
      - ENABLE_AV_MODERATION=1
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JWT_APP_ID=garden_app
      - JWT_APP_SECRET=${JWT_APP_SECRET}
      - TZ=Europe/Moscow
    networks:
      jitsi-network:
        aliases:
          - jitsi-prosody
          - ${XMPP_AUTH_DOMAIN}
          - ${XMPP_GUEST_DOMAIN}
          - ${XMPP_MUC_DOMAIN}
          - ${XMPP_INTERNAL_MUC_DOMAIN}

  jitsi-jicofo:
    image: jitsi/jicofo:jicofo-1.0-1132-1
    restart: unless-stopped
    volumes:
      - ${CONFIG}/jicofo:/config
    environment:
      - ENABLE_AUTH=true
      - ENABLE_RECORDING=true
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_SERVER=jitsi-prosody
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - TZ=Europe/Moscow
    depends_on:
      - jitsi-prosody
    networks:
      jitsi-network:

  jitsi-jvb:
    image: jitsi/jvb:jvb-2.3-234-gbf757253-1
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    volumes:
      - ${CONFIG}/jvb:/config
    environment:
      - DOCKER_HOST_ADDRESS=jitsi-jvb.meet.jitsi
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_SERVER=jitsi-prosody
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - JVB_TCP_HARVESTER_DISABLED=true
      - JVB_TCP_PORT=4443
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302
      - JVB_ENABLE_APIS=rest
      - TZ=Europe/Moscow
    networks:
      jitsi-network:
        aliases:
          - jitsi-jvb.meet.jitsi

networks:
  jitsi-network:
    driver: bridge